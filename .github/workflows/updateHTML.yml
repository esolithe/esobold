name: updateHTML
on:
  workflow_dispatch:
  push:
    branches: [ remoteManagement ]

jobs:
  updateHTML:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v5
    - name: Copy the HTML
      run: |
        cp -r "/home/runner/work/esobold/esobold/embd_res/"* "/home/runner/work/esobold/esobold/docs/static"
        cp "/home/runner/work/esobold/esobold/embd_res/klite.embd" "/home/runner/work/esobold/esobold/docs/index.html"
    - name: Commit HTML
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git add .
        git commit -m "Latest HTML"
        git push
