name: Koboldcpp Mac

on:
  workflow_dispatch:
    inputs:
      commit_hash:
        description: 'Optional commit hash to build from'
        required: false
        default: ''

env:
  BRANCH_NAME: ${{ github.head_ref || github.ref_name }}

jobs:
  osx:
    runs-on: macos-14
    permissions: write-all
    steps:
      - name: Clone
        id: checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ inputs.commit_hash != '' && inputs.commit_hash || github.head_ref || github.ref_name }}
          submodules: true

      - name: Show Commit Used
        run: |
          echo "Building from ref: ${{ inputs.commit_hash != '' && inputs.commit_hash || github.head_ref || github.ref_name }}"

      - name: Get Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: Dependencies
        id: depends
        run: |
          pip install customtkinter pyinstaller tk jinja2 pdfplumber PyMuPdf tqdm chardet tree-sitter tree-sitter-python tree-sitter-javascript tree-sitter-typescript tree-sitter-html tree-sitter-css tree-sitter-cpp tree-sitter-c-sharp tree-sitter-rust tree-sitter-ruby tree-sitter-go tree-sitter-java openai tiktoken prompt_toolkit msgpack numpy asyncssh pyyaml json-repair aiofiles python-ulid requests flask discord.py python-telegram-bot matrix-nio beautifulsoup4

      - name: Build
        id: make_build
        run: |
          make LLAMA_METAL=1 LLAMA_PORTABLE=1
          chmod +x './create_ver_file.sh'
          . create_ver_file.sh
          pyinstaller --noconfirm --onefile --collect-all customtkinter --collect-all jinja2 --collect-all psutil --collect-all pdfplumber --collect-all PyMuPdf --collect-all fitz --collect-all tqdm --collect-all chardet --collect-all tree_sitter --collect-all tree_sitter_python --collect-all tree_sitter_javascript --collect-all tree_sitter_typescript --collect-all tree_sitter_html --collect-all tree_sitter_css --collect-all tree_sitter_cpp --collect-all tree_sitter_c_sharp --collect-all tree_sitter_rust --collect-all tree_sitter_ruby --collect-all tree_sitter_go --collect-all tree_sitter_java --collect-all openai --collect-all tiktoken --hidden-import=tiktoken_ext.openai_public --hidden-import=tiktoken_ext --collect-all prompt_toolkit --collect-all msgpack --collect-all numpy --collect-all asyncssh --collect-all yaml --collect-all json_repair --collect-all aiofiles --collect-all ulid --collect-all requests --collect-all flask --collect-all discord --collect-all telegram --collect-all matrix-nio --collect-all bs4 --add-data "./esoExtras:./esoExtras" --add-data './koboldcpp_default.so:.' --add-data './ggml-metal-merged.metal:.' --add-data './kcpp_adapters:./kcpp_adapters' --add-data './koboldcpp.py:.' --add-data './json_to_gbnf.py:.' --add-data './LICENSE.md:.' --add-data './MIT_LICENSE_GGML_SDCPP_LLAMACPP_ONLY.md:.' --add-data './embd_res:./embd_res' --version-file './version.txt' --clean --console koboldcpp.py -n "koboldcpp-mac-arm64"

      - name: Test
        id: test
        run: |
          wget https://huggingface.co/concedo/koboldcpp/resolve/main/baby_llama.gguf
          dist/koboldcpp-mac-arm64 --model baby_llama.gguf --gpulayers 99 --benchmark --prompt 'Hi, my name is'

      - name: Save artifact
        uses: actions/upload-artifact@v6
        with:
          name: kcpp_mac_binary
          path: dist/

      - name: Upload to GitHub Rolling Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload rolling dist/koboldcpp-mac-arm64 --clobber
