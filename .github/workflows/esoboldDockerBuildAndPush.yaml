name: Esobold build and push to docker

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checking out the repo
        uses: actions/checkout@v6
      - name: Set current tag
        run: |
          latestTag=$(git describe --abbrev=0 --match="RM*" --tags)
          echo "LATEST_TAG=$latestTag" >> $GITHUB_ENV
      - name: Docker Login and setup
        uses: docker/login-action@v3
        with:
          username: ${{secrets.DOCKER_USERNAME}}
          password: ${{secrets.DOCKER_PASSWORD}}
      - name: Building the image
        run: docker build -t ${{secrets.DOCKER_USERNAME}}/esobold -t ${{secrets.DOCKER_USERNAME}}/esobold:$LATEST_TAG .
      - name: Pushing the image
        run: |
          docker push ${{secrets.DOCKER_USERNAME}}/esobold
          docker push ${{secrets.DOCKER_USERNAME}}/esobold:$LATEST_TAG